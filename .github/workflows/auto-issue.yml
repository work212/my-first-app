name: Release branch auto issue

on:
  create:

jobs:
  create-issue:
    if: github.event.ref_type == 'branch' && contains(github.event.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create merge issue
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.ref }}
        run: |
          NAME="${BRANCH#*release/}"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${NAME}のマージ" \
            --body "ブランチ \`${BRANCH}\` が作成されました。マージ作業を行ってください。"
