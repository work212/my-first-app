name: Release PR check

# ============================================================
# release/ブランチのPRで、他のrelease/ブランチへの取り込み確認を促すチェック
#
# 【デフォルトの動作(警告のみモード)】
# - release/ を含むブランチからのPR: 他にrelease/ブランチがあれば
#   警告コメントを投稿する。チェックは緑✓のままでマージはブロックしない
# - それ以外のブランチからのPR: job単位のifでスキップされ、
#   ランナーが起動しないためActionsの実行時間を消費しない(0分)
#
# 【ラベルチェック(マージブロック)を有効にする場合】
# 下記の「★ラベルチェック有効化」マーカーが付いた3箇所のコメントを外すと、
# 他のrelease/ブランチがある間はチェックが赤✗になり、
# PRに「取り込み確認済」ラベルを付けるまで通らなくなる。
# さらにマージボタン自体を押せなくするには、ブランチ保護の設定が必要:
#   Settings → Branches → main の classic branch protection rule で
#   - 「Require status checks to pass before merging」を有効にし、
#     必須チェックとして check-other-release-branches を検索して選択する
#     (チェックボックスを入れるだけでは無効。選択するまでが必須)
#   - 「Do not allow bypassing the above settings」も有効にする
#     (これが無いと管理者は赤✗でもマージできてしまう)
#
# 【注意: 必須チェックの罠】
# 必須チェックに登録した状態で「ワークフロー自体が起動しない」PRがあると、
# そのPRは「Expected — チェック待ち」のまま永遠にマージできなくなる。
# 詰むのはworkflowレベルで起動しない場合:
#   - このファイルがPRのマージ結果に存在しない(mainにも元ブランチにも無い)
#   - on.pull_request の branches / paths フィルタで除外される
# 一方、下記のようなjob単位のifによるスキップは「skipped = 成功扱い」に
# なるため詰まない。ランナーも起動しないので課金もされず、安全かつ低コスト。
# ============================================================

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

jobs:
  check-other-release-branches:
    # release/を含むPRのみ起動。それ以外はskippedになりランナー起動なし(0分)
    # skippedは必須チェック登録時も成功扱いなので詰まない(冒頭の【注意】参照)
    if: contains(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    # 警告コメントの投稿(pull-requests)とラベル自動作成(issues)のための権限追加
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check other release branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD: ${{ github.head_ref }}
          PR: ${{ github.event.pull_request.number }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          # マージ元以外のrelease/ブランチをリモートから検索
          OTHERS=$(gh api "repos/$REPO/branches" --paginate --jq '.[].name' | grep 'release/' | grep -vx "$HEAD" || true)

          if [ -z "$OTHERS" ]; then
            echo "該当なし: 他にrelease/ブランチは存在しません"
            exit 0
          fi

          # ===== ★ラベルチェック有効化(1/3): ここのコメントを外す =====
          # 「取り込み確認済」ラベルが付いていればチェック通過
          #if echo ",$LABELS," | grep -q ",取り込み確認済,"; then
          #  echo "「取り込み確認済」ラベルが付いているためチェックを通過します"
          #  exit 0
          #fi
          #
          # ラベルが未作成の場合に備えて作成しておく(既存ならスキップ)
          #gh label create "取り込み確認済" --repo "$REPO" \
          #  --color 0e8a16 --description "他のrelease/ブランチへの取り込み要否を確認済" 2>/dev/null || true
          # ===== ★ここまで =====

          MARKER="<!-- release-pr-check -->"
          BODY="$MARKER"$'\n'"⚠️ 以下のrelease/ブランチが存在します。今回のマージ内容をこれらのブランチにも取り込む必要があるかご確認ください。"$'\n\n'
          while IFS= read -r br; do
            BODY="$BODY- \`$br\`"$'\n'
          done <<< "$OTHERS"

          # ===== ★ラベルチェック有効化(2/3): ここのコメントを外す =====
          # 警告コメントにラベルの案内文を追加
          #BODY="$BODY"$'\n'"確認できたら、このPRに **取り込み確認済** ラベルを付けてください。チェックが再実行されてマージできるようになります。"
          # ===== ★ここまで =====

          # 同じ警告コメントが既にある場合は重複投稿しない
          if ! gh pr view "$PR" --repo "$REPO" --json comments --jq '.comments[].body' | grep -q "$MARKER"; then
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
          fi

          # ===== ★ラベルチェック有効化(3/3): ここのコメントを外す =====
          # ラベルが付くまでチェックを赤✗にしてマージをブロックする
          #echo "::error::他のrelease/ブランチが存在します。取り込み要否を確認後、PRに「取り込み確認済」ラベルを付けてください。"
          #exit 1
          # ===== ★ここまで =====

          echo "警告のみ: コメントを投稿しました(チェックは通過します)"
          exit 0
